{% if paginator.total_pages > 1 %}
<nav class="paginator" aria-label="分页">
  {% if paginator.previous_page %}
    <a class="paginator__prev" href="{{ paginator.previous_page_path | relative_url }}">← 上一页</a>
  {% else %}
    <span class="paginator__prev is-disabled">← 上一页</span>
  {% endif %}
  <span class="paginator__info">{{ paginator.page }} / {{ paginator.total_pages }}</span>
  {% if paginator.next_page %}
    <a class="paginator__next" href="{{ paginator.next_page_path | relative_url }}">下一页 →</a>
  {% else %}
    <span class="paginator__next is-disabled">下一页 →</span>
  {% endif %}
</nav>
{% endif %}
