# Site
title: "HarmonyHu's Notes"
subtitle: "日日行，不怕千万里"
description: "HarmonyHu 的个人学习笔记 — AI Compiler、深度学习、系统工程与生活随笔。"
url: "https://harmonyhu.com"
baseurl: ""
locale: "zh-CN"
lang: "zh-CN"
timezone: "Asia/Shanghai"
repository: "HarmonyHu/harmonyhu.github.io"

# Author
author:
  name: "HarmonyHu"
  bio: "AI Compiler Engineer · 个人学习笔记"
  avatar: "/img/son.jpg"
  location: "China"
  email: "harmonyhu@foxmail.com"
  github: "HarmonyHu"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: /page:num/
excerpt_separator: <!--more-->

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..4
  syntax_highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Includes / Excludes
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - LICENSE
  - .gitignore
  - .jekyll-cache
  - temporary

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# Navigation
nav:
  - title: "首页"
    url: /
  - title: "归档"
    url: /archive/
  - title: "分类"
    url: /categories/
  - title: "标签"
    url: /tags/
  - title: "关于"
    url: /about/
